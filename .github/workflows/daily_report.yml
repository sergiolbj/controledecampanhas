name: Daily AdOps Report

on:
  schedule:
    # 08:00 BRT (UTC-3) = 11:00 UTC — runs every day
    - cron: '0 11 * * *'
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  send-report:
    name: Build & send daily report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements-report.txt

      - name: Install dependencies
        run: pip install -r requirements-report.txt

      - name: Send report
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SMTP_HOST:    ${{ secrets.SMTP_HOST }}
          SMTP_PORT:    ${{ secrets.SMTP_PORT }}
          SMTP_USER:    ${{ secrets.SMTP_USER }}
          SMTP_PASS:    ${{ secrets.SMTP_PASS }}
          REPORT_TO:    ${{ secrets.REPORT_TO }}
          # Optional: set REPORT_FROM if you want a different sender name/address
          # REPORT_FROM: ${{ secrets.REPORT_FROM }}
        run: python report.py
